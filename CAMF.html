}

section{
padding:30px;

.contenedor-hongos{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.hongo{
background:white;
border-radius:10px;
padding:20px;
cursor:pointer;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
width:200px;
text-align:center;
transition:0.3s;
}

.hongo:hover{
transform:scale(1.05);
background:#e8f5e9;
}

.info{
margin-top:20px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
display:none;
}

footer{
background:#080d50;
color:white;
text-align:center;
padding:15px;
}
</style>

<script>
function mostrarInfo(tipo){

document.getElementById("CAM").style.display="none";
document.getElementById("serie").style.display="none";
document.getElementById("seriex").style.display="none";
document.getElementById("seriexx").style.display="none";

document.getElementById(tipo).style.display="block";

}
</script>
