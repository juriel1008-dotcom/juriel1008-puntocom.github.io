<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cepario UTEG</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#5567bb;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#4f6a92;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

section{
padding:30px;
}

.contenedor-hongos{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.hongo{
background:white;
border-radius:10px;
padding:20px;
cursor:pointer;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
width:200px;
text-align:center;
transition:0.3s;
}

.hongo:hover{
transform:scale(1.05);
background:#e8f5e9;
}

.info{
margin-top:20px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
display:none;
}

footer{
background:#080d50;
color:white;
text-align:center;
padding:15px;
}

/* TABLERO */
#contenedor {
  display: grid;
  grid-template-columns: 40px repeat(8, 70px) 40px;
  grid-template-rows: 40px repeat(8, 70px) 40px;
  margin: 30px auto;
}

.coordenada {
  display: flex;
  justify-content: center;
  align-items: center;
  color: rgb(0, 0, 0);
  font-weight: bold;
}

.casilla {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  cursor: pointer;
  position: relative;
}

.blanca {
  background-color: #eee;
}

.negra {
  background-color: #777;
}

.seleccionada {
  outline: 3px solid yellow;
}

/* TOOLTIP */
.casilla::after {
  content: attr(data-nombre);
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.casilla:hover::after {
  opacity: 1;
}
</style>

<script>
// --- Tablero de ajedrez con nombres ---
const piezas = {
  r: {simbolo:"♜", nombre:"Torre negra"},
  n: {simbolo:"♞", nombre:"Caballo negro"},
  b: {simbolo:"♝", nombre:"Alfil negro"},
  q: {simbolo:"♛", nombre:"Reina negra"},
  k: {simbolo:"♚", nombre:"Rey negro"},
  p: {simbolo:"♟", nombre:"Peón negro"},

  R: {simbolo:"♖", nombre:"Torre blanca"},
  N: {simbolo:"♘", nombre:"Caballo blanco"},
  B: {simbolo:"♗", nombre:"Alfil blanco"},
  Q: {simbolo:"♕", nombre:"Reina blanca"},
  K: {simbolo:"♔", nombre:"Rey blanco"},
  P: {simbolo:"♙", nombre:"Peón blanco"}
};

const estadoInicial = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
];

let seleccion = null;
const letras = ["A","B","C","D","E","F","G","H"];

function crearTablero() {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  for (let fila = 0; fila < 10; fila++) {
    for (let col = 0; col < 10; col++) {
      const celda = document.createElement("div");

      if ((fila === 0 || fila === 9) && (col === 0 || col === 9)) {
        contenedor.appendChild(celda);
        continue;
      }

      if (fila === 0 || fila === 9) {
        if (col > 0 && col < 9) {
          celda.textContent = letras[col - 1];
          celda.classList.add("coordenada");
        }
        contenedor.appendChild(celda);
        continue;
      }

      if (col === 0 || col === 9) {
        celda.textContent = 8 - (fila - 1);
        celda.classList.add("coordenada");
        contenedor.appendChild(celda);
        continue;
      }

      const f = fila - 1;
      const c = col - 1;

      celda.classList.add("casilla");
      celda.classList.add((f + c) % 2 === 0 ? "blanca" : "negra");

      celda.dataset.fila = f;
      celda.dataset.col = c;

      const pieza = estadoInicial[f][c];
      if (pieza !== ".") {
        celda.textContent = piezas[pieza].simbolo;
        celda.setAttribute("data-nombre", piezas[pieza].nombre);
      }

      celda.addEventListener("click", manejarClick);
      contenedor.appendChild(celda);
    }
  }
}

function manejarClick(e) {
  const casilla = e.currentTarget;

  if (!seleccion) {
    if (casilla.textContent !== "") {
      seleccion = casilla;
      casilla.classList.add("seleccionada");
    }
  } else {
    casilla.textContent = seleccion.textContent;
    casilla.setAttribute("data-nombre", seleccion.getAttribute("data-nombre"));

    seleccion.textContent = "";
    seleccion.removeAttribute("data-nombre");

    seleccion.classList.remove("seleccionada");
    seleccion = null;
  }
}

window.onload = crearTablero;
</script>

</head>
<body>

<header>
  <h1>Sefario UTEG</h1>
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="#tipos">Series de Hongos</a>
  <a href="#contacto">Contacto</a>
</nav>

<section>
  <h2>Tablero de Ajedrez</h2>
  <div id="contenedor"></div>
</section>

<footer>
  <p>© 2026 Sefario UTEG</p>
</footer>

</body>
</html>
